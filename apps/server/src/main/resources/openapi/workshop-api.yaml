openapi: 3.0.3
info:
  title: 워크샵 API
  version: 0.1.0
  description: 클라이언트/관리자 연동을 위한 읽기 API 초안
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/login:
    post:
      summary: 로그인 인증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401':
          description: UNAUTHORIZED
  /api/v1/workshop/overview:
    get:
      summary: 워크샵 개요 통계 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewResponse'
  /api/v1/workshop/schedules:
    get:
      summary: 일정 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleItemResponse'
  /api/v1/workshop/missions:
    get:
      summary: 미션 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MissionResponse'
  /api/v1/workshop/sessions:
    get:
      summary: 세션 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionResponse'
  /api/v1/workshop/users:
    get:
      summary: 사용자 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
components:
  schemas:
    OverviewResponse:
      type: object
      properties:
        activeMissions:
          type: integer
        upcomingSessions:
          type: integer
        totalUsers:
          type: integer
        totalSchedules:
          type: integer
        pendingSubmissions:
          type: integer
      required: [activeMissions, upcomingSessions, totalUsers, totalSchedules, pendingSubmissions]
    ScheduleItemResponse:
      type: object
      properties:
        id: { type: string }
        day: { type: string }
        startsAt: { type: string }
        endsAt: { type: string }
        title: { type: string }
        location: { type: string }
      required: [id, day, startsAt, endsAt, title, location]
    MissionResponse:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        points: { type: integer }
        active: { type: boolean }
        pendingApprovals: { type: integer }
      required: [id, title, points, active, pendingApprovals]
    SessionResponse:
      type: object
      properties:
        id: { type: string }
        team: { type: string }
        title: { type: string }
        speaker: { type: string }
        room: { type: string }
        liveQa: { type: boolean }
        pendingQuestions: { type: integer }
      required: [id, team, title, speaker, room, liveQa, pendingQuestions]
    UserResponse:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        team: { type: string }
        department: { type: string }
        role: { type: string }
      required: [id, name, team, department, role]
    AuthLoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    AuthLoginResponse:
      type: object
      properties:
        role: { type: string }
      required: [role]
