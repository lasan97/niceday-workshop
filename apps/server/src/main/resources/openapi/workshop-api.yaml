openapi: 3.0.3
info:
  title: 워크샵 API
  version: 0.1.0
  description: 클라이언트/관리자 연동을 위한 읽기 API 초안
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/login:
    post:
      summary: 로그인 인증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401':
          description: UNAUTHORIZED
  /api/v1/workshop/overview:
    get:
      summary: 워크샵 개요 통계 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewResponse'
  /api/v1/workshop/schedules:
    get:
      summary: 일정 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleItemResponse'
    post:
      summary: 일정 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpsertRequest'
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleItemResponse'
  /api/v1/workshop/schedules/{id}:
    patch:
      summary: 일정 수정
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleItemResponse'
    delete:
      summary: 일정 삭제
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: NO CONTENT
  /api/v1/workshop/missions:
    get:
      summary: 미션 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MissionResponse'
    post:
      summary: 미션 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MissionUpsertRequest'
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionResponse'
  /api/v1/workshop/missions/{id}:
    patch:
      summary: 미션 수정
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MissionUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionResponse'
    delete:
      summary: 미션 삭제
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: NO CONTENT
  /api/v1/workshop/sessions:
    get:
      summary: 세션 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionResponse'
    post:
      summary: 세션 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionUpsertRequest'
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
  /api/v1/workshop/sessions/{id}:
    patch:
      summary: 세션 수정
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
    delete:
      summary: 세션 삭제
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: NO CONTENT
  /api/v1/workshop/users:
    get:
      summary: 사용자 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      summary: 사용자 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /api/v1/workshop/users/{id}:
    patch:
      summary: 사용자 수정
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: 사용자 삭제
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: NO CONTENT
components:
  schemas:
    OverviewResponse:
      type: object
      properties:
        activeMissions:
          type: integer
        upcomingSessions:
          type: integer
        totalUsers:
          type: integer
        totalSchedules:
          type: integer
        pendingSubmissions:
          type: integer
      required: [activeMissions, upcomingSessions, totalUsers, totalSchedules, pendingSubmissions]
    ScheduleItemResponse:
      type: object
      properties:
        id: { type: string }
        day: { type: string }
        startsAt: { type: string }
        endsAt: { type: string }
        title: { type: string }
        location: { type: string }
      required: [id, day, startsAt, endsAt, title, location]
    ScheduleUpsertRequest:
      type: object
      properties:
        day: { type: string }
        startsAt: { type: string }
        endsAt: { type: string }
        title: { type: string }
        location: { type: string }
      required: [day, startsAt, endsAt, title, location]
    MissionResponse:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        points: { type: integer }
        active: { type: boolean }
        pendingApprovals: { type: integer }
      required: [id, title, points, active, pendingApprovals]
    MissionUpsertRequest:
      type: object
      properties:
        title: { type: string }
        points: { type: integer }
        active: { type: boolean }
        pendingApprovals: { type: integer }
      required: [title, points, active, pendingApprovals]
    SessionResponse:
      type: object
      properties:
        id: { type: string }
        team: { type: string }
        title: { type: string }
        speaker: { type: string }
        room: { type: string }
        liveQa: { type: boolean }
        pendingQuestions: { type: integer }
      required: [id, team, title, speaker, room, liveQa, pendingQuestions]
    SessionUpsertRequest:
      type: object
      properties:
        team: { type: string }
        title: { type: string }
        speaker: { type: string }
        room: { type: string }
        liveQa: { type: boolean }
        pendingQuestions: { type: integer }
      required: [team, title, speaker, room, liveQa, pendingQuestions]
    UserResponse:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        team: { type: string }
        department: { type: string }
        role: { type: string }
      required: [id, name, team, department, role]
    UserUpsertRequest:
      type: object
      properties:
        name: { type: string }
        team: { type: string }
        department: { type: string }
        role: { type: string }
      required: [name, team, department, role]
    AuthLoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    AuthLoginResponse:
      type: object
      properties:
        role: { type: string }
      required: [role]
