<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex justify-center min-h-screen">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-gradient-to-b from-blue-50 to-white dark:from-slate-900 dark:to-background-dark group/design-root overflow-x-hidden shadow-lg">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100 cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Nice Day Login</h2>
</div>
<div class="flex flex-col items-center justify-center pt-8 pb-4">
<div class="size-24 bg-primary text-white rounded-full flex items-center justify-center mb-4 shadow-md">
<span class="material-symbols-outlined text-4xl">domain</span>
</div>
<h1 class="text-2xl font-bold leading-tight tracking-[-0.015em] px-4 text-center">Welcome to Gangneung Workshop!</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Sign in to access event details and schedules.</p>
</div>
<div class="flex-1 flex flex-col justify-center px-6 py-4 mt-4">
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<span class="text-sm font-medium leading-normal pb-1.5 text-slate-700 dark:text-slate-300">Employee ID</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-colors" placeholder="Enter your Employee ID" type="text"/>
</label>
<label class="flex flex-col w-full">
<span class="text-sm font-medium leading-normal pb-1.5 text-slate-700 dark:text-slate-300">Password</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-colors" placeholder="Enter your Password" type="password"/>
</label>
</div>
<div class="flex justify-end mt-3 mb-8">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Find Password?</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl flex items-center justify-center shadow-md transition-all active:scale-[0.98]">
                Login
            </button>
</div>
<div class="py-8 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500">Nice Day Corporation</p>
</div>
</div>
</body></html>
